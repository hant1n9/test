# 必读！！！
# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。
# 跑裸核用户请自行去掉下方控制面板模块的注释。
# 机场订阅
proxy-providers:
  Airport1:
    url: ""
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

# 全局配置
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
# interface-name: enp6s18
log-level: warning
find-process-mode: 'off'
# global-client-fingerprint 已废弃；如某个手写节点需要指纹，请在对应 proxy 内单独设置 client-fingerprint。
# 订阅节点通常由机场配置决定，这里不再全局覆盖，避免 Nikki/Mihomo 启动时输出废弃警告。
# global-client-fingerprint: firefox
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 为防止使用插件朋友遇到面板问题，我注释掉了此模块。
# 跑裸核朋友自行删除注释即可，使用nikki仅内核的ui路径改为/etc/nikki/run/ui
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: "/etc/mihomo/ui"
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "+.baidu.com"
    - "+.tailscale.com"
    - "+.ts.net"

# 入站
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #使用仅内核自行修改下面三项为true
  #device: nikki
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false
  # Tailscale 网段排除，防止 TUN 劫持产生路由环路
  route-exclude-address:
    - 100.64.0.0/10
    - fd7a:115c:a1e0::/48

# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:private_domain,cn_domain"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "+.market.xiaomi.com"
    # Tailscale 域名排除 fake-ip
    - "+.tailscale.com"
    - "+.ts.net"
    - "+.tailscale.io"
  default-nameserver:
    - 223.5.5.5
  proxy-server-nameserver:
    - 119.29.29.29
  # namesever尽量用运营商提供的DNS
  nameserver:
    - 223.5.5.5
    - 119.29.29.29

# 出站策略，根据自己情况调整每个策略里分组排序，增删都可以，比如把美国自动放到第一个，比如删除香港故转，注意别漏掉表情逗号等。
# 如果相应分组没有筛选到对应的国家，请根据自己节点名字调整筛选关键字。
# 没有再使用锚点，是考虑很多新手修改难度，这样新手修改某个分组更容易些。
# 节点信息
proxies:
  - name: 直连
    type: direct
  # Mihomo 1.19.25+ 支持的 Tailscale 出站节点；旧版 Nikki/Mihomo 会报 unsupport proxy type。
  - name: tailscale
    type: tailscale
    hostname: iStoreOS-Mihomo
    # 认证密钥：在 https://login.tailscale.com/admin/settings/keys 生成。
    # 不填写时，首次访问该节点会在 Mihomo 日志中输出登录 URL。
    auth-key: ""
    # 保存 tsnet 登录状态，避免重启后重新认证。
    state-dir: "/etc/nikki/run/tailscale"
    # 接受 Tailnet 中发布的子网路由。
    accept-routes: true
    # 启用 UDP，支持 DERP/STUN 打洞。
    udp: true
    # false 表示非临时节点，关闭后不会自动从 Tailnet 移除。
    ephemeral: false

proxy-groups:
  - name: 🚀 默认代理
    type: select
    proxies:
      - 🔯 全部故转
      - ♻️ 自动选择
      - 🌐 全部节点
      - 直连

  - name: 📹 YouTube
    type: select
    proxies:
      - 🔯 美国故转
      - 🔯 日本故转
      - ♻️ 美国自动
      - ♻️ 日本自动
      - ♻️ 自动选择
      - 🌐 全部节点
      - 直连

  - name: 🍀 Google
    type: select
    proxies:
      - 🔯 日本故转
      - 🔯 美国故转
      - ♻️ 日本自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🌐 全部节点
      - 直连

  - name: 🤖 ChatGPT
    type: select
    proxies:
      - 🔯 日本故转
      - 🔯 美国故转
      - ♻️ 日本自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🌐 全部节点
      - 直连

  - name: 👨🏿‍💻 GitHub
    type: select
    proxies:
      - 🔯 日本故转
      - 🔯 美国故转
      - ♻️ 日本自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🌐 全部节点
      - 直连

  - name: 🐬 OneDrive
    type: select
    proxies:
      - 🔯 日本故转
      - 🔯 美国故转
      - ♻️ 日本自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🌐 全部节点
      - 直连

  - name: 🪟 Microsoft
    type: select
    proxies:
      - 🔯 日本故转
      - 🔯 美国故转
      - ♻️ 日本自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🌐 全部节点
      - 直连

  - name: 📲 Telegram
    type: select
    proxies:
      - 🔯 日本故转
      - 🔯 美国故转
      - ♻️ 日本自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🌐 全部节点
      - 直连

  - name: 🐦 Twitter
    type: select
    proxies:
      - 🔯 日本故转
      - 🔯 美国故转
      - ♻️ 日本自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🌐 全部节点
      - 直连

  - name: 💶 PayPal
    type: select
    proxies:
      - 🔯 日本故转
      - 🔯 美国故转
      - ♻️ 日本自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🌐 全部节点
      - 直连

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 默认代理
      - 🔯 日本故转
      - 🔯 美国故转
      - ♻️ 日本自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🌐 全部节点
      - 直连

  - name: ♻️ 日本自动
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"

  - name: ♻️ 美国自动
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"

  - name: 🔯 日本故转
    type: fallback
    tolerance: 20
    interval: 300
    proxies:
      - ♻️ 日本自动
      - ♻️ 自动选择

  - name: 🔯 美国故转
    type: fallback
    tolerance: 20
    interval: 300
    proxies:
      - ♻️ 美国自动
      - ♻️ 自动选择

  - name: 🔯 全部故转
    type: fallback
    tolerance: 20
    interval: 300
    proxies:
      - 🔯 日本故转
      - 🔯 美国故转
      - ♻️ 自动选择

  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: "^((?!(直连)).)*$"

  - name: 🌐 全部节点
    type: select
    include-all: true

# 规则匹配
# 此规则部分没有做防泄露处理，因为弊严重大于利！
rules:
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,private_domain,直连
  # Tailscale 直连规则
  - IP-CIDR,100.64.0.0/10,直连,no-resolve
  - DOMAIN-SUFFIX,tailscale.com,直连
  - DOMAIN-SUFFIX,ts.net,直连
  - DOMAIN-SUFFIX,tailscale.io,直连
  - RULE-SET,ai,🤖 ChatGPT
  - RULE-SET,github_domain,👨🏿‍💻 GitHub
  - RULE-SET,youtube_domain,📹 YouTube
  - RULE-SET,google_domain,🍀 Google
  - RULE-SET,onedrive_domain,🐬 OneDrive
  - RULE-SET,microsoft_domain,🪟 Microsoft
  - RULE-SET,apple_domain,直连
  - RULE-SET,telegram_domain,📲 Telegram
  - RULE-SET,twitter_domain,🐦 Twitter
  - RULE-SET,paypal_domain,💶 PayPal
  - RULE-SET,apple_ip,直连
  - RULE-SET,google_ip,🍀 Google
  - RULE-SET,telegram_ip,📲 Telegram
  - RULE-SET,geolocation-!cn,🚀 默认代理
  - RULE-SET,cn_domain,直连
  - RULE-SET,cn_ip,直连
  - MATCH,🐟 漏网之鱼

# 规则集
## type：可选http/file/inline  behavior：可选domain/ipcidr format：可选yaml/mrs
rule-anchor:
  ip: &ip
    type: http
    interval: 86400
    behavior: ipcidr
    format: mrs
  domain: &domain
    type: http
    interval: 86400
    behavior: domain
    format: mrs

rule-providers:
